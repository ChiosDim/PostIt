services:
  - type: web
    name: postit-notes
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      # Add any OAuth provider keys (Google, GitHub, etc.)
      - key: GITHUB_ID
        sync: false
      - key: GITHUB_SECRET
        sync: false
    plan: free